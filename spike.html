<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nimiq ROSCA — Gate 1 spike</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        max-width: 480px;
        margin: 0 auto;
        padding: 1rem;
        background: #0b0f14;
        color: #e6edf3;
      }
      h1 { font-size: 1.1rem; margin-bottom: 0.25rem; }
      p.sub { color: #8b949e; font-size: 0.85rem; margin-top: 0; }
      a { color: #2f81f7; }
      section {
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      h2 { font-size: 0.95rem; margin: 0 0 0.75rem; }
      label { display: block; font-size: 0.8rem; color: #8b949e; margin-top: 0.5rem; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 0.5rem;
        margin-top: 0.25rem;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
      }
      button {
        margin-top: 0.75rem;
        width: 100%;
        padding: 0.65rem;
        border: none;
        border-radius: 6px;
        background: #2f81f7;
        color: white;
        font-weight: 600;
        font-size: 0.9rem;
      }
      button:disabled { background: #30363d; color: #8b949e; }
      pre {
        margin-top: 0.75rem;
        padding: 0.5rem;
        background: #161b22;
        border-radius: 6px;
        font-size: 0.75rem;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }
    </style>
  </head>
  <body>
    <h1>Nimiq ROSCA — Gate 1 spike</h1>
    <p class="sub">Not the product UI — proving the money path before building it.</p>
    <p class="sub"><a href="/">&larr; back to app</a></p>

    <section>
      <h2>1. Polygon (Amoy) support check</h2>
      <button id="polygon-check-btn">Check Polygon (Amoy) support</button>
      <pre id="polygon-check-log">Not run yet.</pre>
    </section>

    <section>
      <h2>2. NIM payment</h2>
      <pre id="nimiq-status">Connecting...</pre>
      <label for="nim-recipient">Recipient NIM address</label>
      <input id="nim-recipient" type="text" placeholder="NQ07 0000 0000 0000 0000 0000 0000 0000 0000" />
      <label for="nim-amount">Amount (NIM)</label>
      <input id="nim-amount" type="number" value="1" min="0" step="0.001" />
      <button id="nim-send-btn">Send NIM</button>
      <pre id="nim-log">No payment sent yet.</pre>
    </section>

    <script type="module" src="/src/spike-main.ts"></script>
  </body>
</html>
